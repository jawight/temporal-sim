				--loading-nav-bg: #ffffff;
				--loading-border-color: #aebed9;
				--ellipse-shadow: rgb(0 0 0 / 15%);
				--ellipse-drop-shadow: drop-shadow(0 4px 12px var(--ellipse-shadow));
			}

			:root.dark {
				--loading-bg: #141414;
				--loading-container-bg: #141414;
				--loading-nav-bg: #000000;
				--loading-border-color: #273860;
				--ellipse-shadow: rgb(255 255 255 / 25%);
			}

			#app-loader {
				position: fixed;
				top: 0;
				left: 0;
				width: 100dvw;
				height: 100dvh;
				background: var(--loading-bg);
				z-index: 9999;
			}

			#loading-shell {
				display: flex;
				height: 100dvh;
			}

			#loading-content-container {
				width: 100%;
				display: flex;
				flex-direction: column;
				background: var(--loading-container-bg);
			}

			#loading-content {
				flex: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
			}

			#loading-left-nav {
				background: #4f46e5;
				background: linear-gradient(to bottom, #4f46e5, #1e1b4b);
				width: 66px;
				align-items: center;
				justify-content: start;
				padding-top: 20px;
				flex-direction: column;
				border-right: 1px solid var(--loading-border-color);
			}

			#loading-top-nav {
				height: 49px;
				width: 100%;
				padding: 0 20px;
				background: var(--loading-nav-bg);
				border-bottom: 1px solid var(--loading-border-color);
			}

			#loading-bottom-nav {
				align-items: center;
				background: #4f46e5;
				background: linear-gradient(to bottom, #4f46e5, #1e1b4b);
				height: 60px;
				border-top: 1px solid var(--loading-border-color);
				padding-left: 20px;
			}

			@media (max-width: 779px) {
				#loading-left-nav {
					display: none;
				}

				#loading-top-nav {
					display: none;
				}

				#loading-bottom-nav {
					display: flex;
				}
			}

			@media (min-width: 780px) {
				#loading-left-nav {
					display: flex;
				}

				#loading-top-nav {
					display: flex;
				}

				#loading-bottom-nav {
					display: none;
				}
			}
		</style>

			async function purge() {
				return await fetch('/purge');
			}

			// Save and restore loader animation progress
			function saveLoaderProgress() {
				const verticalEllipse = document.querySelector('.vertical-ellipse');
				const horizontalEllipse = document.querySelector('.horizontal-ellipse');

				if (verticalEllipse && horizontalEllipse) {
					const animations = [
						...verticalEllipse.getAnimations(),
						...horizontalEllipse.getAnimations()
					];

					if (animations.length > 0) {
						// Save current animation time and timestamp
						const saveData = {
							animationTime: animations[0].currentTime,
							timestamp: Date.now()
						};
						sessionStorage.setItem('loaderProgress', JSON.stringify(saveData));
					}
				}
			}
			globalThis.saveLoaderProgress = saveLoaderProgress;

			function restoreLoaderProgress() {
				const savedData = sessionStorage.getItem('loaderProgress');
				if (savedData) {
					try {
						const { animationTime, timestamp } = JSON.parse(savedData);
						const now = Date.now();
						const elapsedTime = now - timestamp;

						// If more than 15 seconds have passed, start from beginning
						if (elapsedTime > 15000) {
							sessionStorage.removeItem('loaderProgress');
							return;
						}

						// Calculate where animation should be now based on elapsed real time
						const targetTime = animationTime + elapsedTime;

						const verticalEllipse = document.querySelector('.vertical-ellipse');
						if (verticalEllipse) {
							const animations = verticalEllipse.getAnimations();
							if (animations.length > 0) {
								const duration = animations[0].effect.getTiming().duration; // 7000ms

								// Define breakpoints as percentages of total animation (7s)
								const breakpoints = [
									{ percent: 0, description: 'animation start' }, // 0ms
									{ percent: 7.5, description: 'drawing complete' }, // ~525ms
									{ percent: 25, description: 'pre-transform hold' }, // ~1750ms
									{ percent: 33.33, description: 'transform complete' }, // ~2333ms
									{ percent: 58.33, description: 'transform hold end' }, // ~4083ms
									{ percent: 66.67, description: 'return rotation complete' }, // ~4667ms
									{ percent: 80, description: 'shape hold end' }, // ~5600ms
									{ percent: 86.67, description: 'disappear complete' } // ~6067ms
								];

								// Convert target time to percentage
								const targetPercent = (targetTime / duration) * 100;

								// Find the next breakpoint (or loop back to first)
								let nextBreakpoint = breakpoints.find(
									(bp) => bp.percent > targetPercent % 100
								);
								if (!nextBreakpoint) {
									nextBreakpoint = breakpoints[0]; // Loop back to beginning
								}

								// Set animation to the chosen breakpoint
								const breakpointTime =
									(nextBreakpoint.percent / 100) * duration;

								document
									.querySelectorAll('.vertical-ellipse, .horizontal-ellipse')
									.forEach((el) => {
										el.getAnimations().forEach((anim) => {
											anim.currentTime = breakpointTime;
										});
									});
							}
						}
					} catch (e) {
						// If parsing fails, remove the invalid data
						sessionStorage.removeItem('loaderProgress');
					}
				}
			}

			// Save progress when page unloads
			window.addEventListener('beforeunload', saveLoaderProgress);

			// Restore progress when animations start
			window.addEventListener('DOMContentLoaded', () => {
				requestAnimationFrame(restoreLoaderProgress);
			});
			const localStoragePref = localStorage.getItem('dark mode');
			const darkModeOn = localStoragePref === 'true';
			const lightModeOff = localStoragePref !== 'false';

			const darkPreference = window?.matchMedia?.(
				'(prefers-color-scheme: dark)'
			)?.matches;

			if (
				darkModeOn ||
				(darkPreference &&
					(localStoragePref === null || localStoragePref === '"system"'))
			) {
				document.documentElement.classList.add('dark');
			}

			function shouldRefresh(refresh, url) {
				const { date: lastRefresh, url: lastUrl } = refresh;

				if (lastUrl === null) {
					return true;
				}

				if (url !== lastUrl) {
					return false;
				}

				const now = new Date().getTime();
				const delay = 1 * 1 * 1000;

				if (lastRefresh + delay > now) {
					return false;
				}

				return true;
			}

			function setAutoRefresh(url) {
				window.localStorage.setItem(
					'shouldRefresh',
					JSON.stringify({ url, date: new Date().getTime() })
				);
			}

			function errorCheck(error) {
				const message = error?.reason?.message || '';

				if (
					message.startsWith('Failed to fetch dynamically imported module:')
				) {
					const lastRefresh = JSON.parse(
						window.localStorage.getItem('shouldRefresh') || '{}'
					);

					const refresh = shouldRefresh(lastRefresh, 'purge');
					setAutoRefresh('purge');

					// Check if this works for safari, then swap it out with the purge or combine it? ¯\_(ツ)_/¯
					// const response = await fetch(window.location.href, { cache: 'reload' });

					// Let's just try forcing the browser cache out either way, more requests to the CDN but it should be fine
					purge()
						.then((response) => {
							// Check if we've tried the hard refresh using the purge header if we have recently skip reloading
							if (refresh && response.status === 200) {
								console.log('reloading');
								// Call reload(true) in FF this will force a purge of the cache in other browsers it won't
								// but the extra param is a no-op
								// https://developer.mozilla.org/en-US/docs/Web/API/Location/reload#parameters
								location.reload(true);
								// Maybe emit another error so we can check how many errors we have byeond this code path
							} else {
								console.log('skipped refresh');
							}
						})
						.catch((e) => {
							console.error(e);
						});
				}
			}

			window.addEventListener('error', errorCheck);
			window.addEventListener('unhandledrejection', errorCheck);
